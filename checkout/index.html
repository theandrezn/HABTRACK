<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Stripe Checkout | HabTrack</title>
  <link rel="icon" type="image/png" href="../images/habtrack-icon.png">
  <link rel="stylesheet" href="checkout.css">
  <script>
    window.pixelId = "6a172153f57a01e3a3e47ada";
    var a = document.createElement("script");
    a.async = true;
    a.defer = true;
    a.src = "https://cdn.utmify.com.br/scripts/pixel/pixel.js";
    document.head.appendChild(a);
  </script>
  <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>
</head>
<body>
  <header class="checkout-header">
    <div class="checkout-header__inner">
      <a class="checkout-logo-link" href="../" aria-label="Return to HabTrack">
        <img class="checkout-logo" src="../images/habtrack-logo-header.png" alt="HabTrack">
      </a>
      <span class="secure-label">Secure Stripe Checkout</span>
    </div>
  </header>

  <main class="checkout-shell">
    <section class="checkout-dialog" aria-labelledby="checkout-title">
      <div class="dialog-intro">
        <div class="store-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="m4 10 1.2-5h13.6L20 10a3 3 0 0 1-1 2.24V20H5v-7.76A3 3 0 0 1 4 10Zm3 3v5h10v-5a3 3 0 0 1-3-1.35A3 3 0 0 1 9 11.65 3 3 0 0 1 7 13Zm-.2-6-.72 3A1 1 0 0 0 8 10l.5-3H6.8Zm3.72 0-.5 3A1 1 0 0 0 12 10V7h-1.48ZM14 7v3a1 1 0 0 0 1.98 0l-.5-3H14Zm3.52 0 .5 3a1 1 0 0 0 1.9 0l-.72-3h-1.68Z"/></svg>
        </div>
        <div>
          <p class="eyebrow">HabTrack digital system</p>
          <h1 id="checkout-title">Opening Stripe Checkout</h1>
          <p id="checkout-message" class="dialog-description">Please wait while we prepare your secure payment page.</p>
        </div>
      </div>
      <p class="legal-copy">You will be redirected to Stripe's secure hosted checkout page.</p>
    </section>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var bumps = params.get("bumps") ? params.get("bumps").split(",").filter(Boolean) : [];
      var attribution = ["utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term", "fbclid", "gclid"].reduce(function (values, key) {
        if (params.get(key)) values[key] = params.get(key);
        return values;
      }, {});

      fetch("/api/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bumps: bumps, attribution: attribution })
      })
        .then(function (response) { return response.json().then(function (body) { return { ok: response.ok, body: body }; }); })
        .then(function (result) {
          if (!result.ok || !result.body.url) throw new Error(result.body.error || "Unable to open Stripe Checkout.");
          window.location.replace(result.body.url);
        })
        .catch(function (error) {
          document.querySelector("#checkout-title").textContent = "Checkout unavailable";
          document.querySelector("#checkout-message").textContent = error.message;
        });
    })();
  </script>
</body>
</html>
